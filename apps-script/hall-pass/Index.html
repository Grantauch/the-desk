<!doctype html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      :root {
        --ink: #202127;
        --muted: #6a6b72;
        --paper: #f5f3ed;
        --line: #d9d5ca;
        --accent: #a63a2f;
        --accent-dark: #72271f;
        --accent-soft: #fff0ed;
        --green: #08765a;
        --green-soft: #e4fff5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      * { box-sizing: border-box; }
      body { min-width: 300px; margin: 0; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      [hidden] { display: none !important; }

      .shell { width: min(940px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 70px; }
      .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
      .eyebrow { margin: 0 0 7px; color: var(--accent); font: 800 10px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: .13em; text-transform: uppercase; }
      h1 { margin: 0; font: 800 clamp(38px, 8vw, 64px)/.92 Georgia, serif; letter-spacing: -.055em; text-transform: lowercase; }
      h1 span { color: var(--accent); }
      .school { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
      .mode { flex: 0 0 auto; padding: 7px 10px; border: 1px solid var(--line); border-radius: 999px; background: white; color: var(--muted); font: 800 10px/1 ui-monospace, SFMono-Regular, Consolas, monospace; text-transform: uppercase; }

      .card { padding: clamp(20px, 4vw, 34px); border: 1px solid var(--line); border-radius: 21px; background: rgba(255,255,255,.9); box-shadow: 0 28px 65px -54px rgba(0,0,0,.8); }
      .loading { padding: 65px 20px; color: var(--muted); text-align: center; }
      .message { margin: 0; color: var(--muted); line-height: 1.55; }
      .error { margin-bottom: 16px; padding: 12px 14px; border: 1px solid #e2aaa5; border-radius: 11px; background: var(--accent-soft); color: var(--accent-dark); font-size: 14px; font-weight: 700; }

      .student-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
      .student-head h2, .section-title { margin: 0; font: 800 clamp(28px, 6vw, 43px)/1 Georgia, serif; letter-spacing: -.04em; }
      .student-meta { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
      .status-dot { display: inline-flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: 999px; background: var(--green-soft); color: #04503d; font: 800 10px/1 ui-monospace, SFMono-Regular, Consolas, monospace; text-transform: uppercase; }
      .status-dot::before { width: 7px; height: 7px; border-radius: 50%; background: var(--green); content: ''; }
      .status-dot.busy { background: var(--accent-soft); color: var(--accent-dark); }
      .status-dot.busy::before { background: var(--accent); }

      .pass-action { display: grid; gap: 14px; margin-top: 28px; }
      .primary { min-height: 70px; padding: 0 24px; border: 1px solid var(--ink); border-radius: 15px; background: var(--ink); color: white; font-size: 19px; font-weight: 900; transition: 140ms ease; }
      .primary:hover { border-color: var(--accent-dark); background: var(--accent-dark); transform: translateY(-1px); }
      .primary.return { border-color: var(--green); background: var(--green); }
      .primary:disabled { cursor: not-allowed; opacity: .45; transform: none; }
      .secondary { min-height: 43px; padding: 0 15px; border: 1px solid var(--line); border-radius: 10px; background: white; color: var(--ink); font-weight: 800; }
      .secondary:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-dark); }

      .timer { padding: 22px; border: 1px solid #b9dfd2; border-radius: 15px; background: var(--green-soft); text-align: center; }
      .timer-label { margin: 0; color: #046049; font: 800 10px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: .1em; text-transform: uppercase; }
      .timer-time { margin: 5px 0 0; color: #04503d; font: 800 clamp(42px, 12vw, 68px)/1 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: -.05em; }

      .pin-box { max-width: 430px; margin: 0 auto; text-align: center; }
      .pin-box h2 { margin: 0; font: 800 36px/1 Georgia, serif; letter-spacing: -.04em; }
      .pin-box .message { margin-top: 9px; }
      .pin-input { width: min(100%, 290px); min-height: 62px; margin-top: 20px; padding: 0 16px; border: 1px solid var(--line); border-radius: 13px; background: white; color: var(--ink); font: 800 29px/1 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: .22em; text-align: center; outline: none; }
      .pin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(166,58,47,.1); }
      .pin-box .primary { width: min(100%, 290px); min-height: 54px; margin-top: 10px; font-size: 16px; }

      .teacher-grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 18px; margin-top: 22px; }
      .subcard { padding: 18px; border: 1px solid var(--line); border-radius: 14px; background: white; }
      .subcard h3 { margin: 0 0 12px; font: 800 11px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: .1em; text-transform: uppercase; }
      .active-pass { padding: 15px; border: 1px solid #e2aaa5; border-radius: 12px; background: var(--accent-soft); }
      .active-pass + .active-pass { margin-top: 9px; }
      .active-pass strong { display: block; font-size: 15px; }
      .active-pass small { display: block; margin-top: 4px; color: var(--muted); }
      .active-pass .secondary { width: 100%; margin-top: 12px; }
      .all-clear { padding: 23px 12px; color: var(--muted); text-align: center; }
      .override { display: grid; gap: 10px; }
      select { width: 100%; min-height: 46px; padding: 0 11px; border: 1px solid var(--line); border-radius: 10px; background: white; outline: none; }
      select:focus { border-color: var(--accent); }

      .log { margin-top: 18px; overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { padding: 9px 8px; border-bottom: 2px solid var(--line); color: var(--muted); text-align: left; text-transform: uppercase; letter-spacing: .06em; }
      td { padding: 10px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
      .method { color: var(--muted); font: 700 10px/1 ui-monospace, SFMono-Regular, Consolas, monospace; text-transform: uppercase; }
      .privacy { margin: 16px 2px 0; color: var(--muted); font-size: 11px; line-height: 1.45; }

      @media (max-width: 700px) {
        .shell { width: min(100% - 18px, 940px); padding-top: 18px; }
        .top, .student-head { align-items: flex-start; flex-direction: column; }
        .teacher-grid { grid-template-columns: 1fr; }
        .card { border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="top">
        <div>
          <p class="eyebrow">grantdesk // out-of-room pass</p>
          <h1 id="app-title">hall pass<span>.</span></h1>
          <p class="school">Mt. Morris Consolidated Schools</p>
        </div>
        <span class="mode" id="mode-label"></span>
      </header>

      <section class="card">
        <div id="error" class="error" hidden></div>
        <div id="content" class="loading">checking the pass…</div>
      </section>
      <p class="privacy">Pass history is visible only to the teacher account. Student screens never show another student’s name or previous trips.</p>
    </main>

    <script>
      const APP_MODE = <?!= JSON.stringify(appMode) ?>;
      const content = document.querySelector('#content');
      const errorBox = document.querySelector('#error');
      const modeLabel = document.querySelector('#mode-label');
      let state = null;
      let pinToken = '';
      let timerHandle = null;
      let refreshHandle = null;

      modeLabel.textContent = APP_MODE === 'teacher' ? 'teacher view' : APP_MODE === 'kiosk' ? 'kiosk' : 'student pass';

      const call = (name, ...args) => new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((failure) => reject(new Error(failure && failure.message ? failure.message : 'The pass could not update.')))[name](...args);
      });

      const escapeHtml = (value) => String(value == null ? '' : value).replace(/[&<>"']/g, (character) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[character]));

      const showError = (message) => {
        errorBox.textContent = message;
        errorBox.hidden = false;
      };
      const clearError = () => { errorBox.hidden = true; errorBox.textContent = ''; };

      const setTitle = (title) => {
        const clean = String(title || 'hall pass').replace(/\.$/, '');
        document.querySelector('#app-title').innerHTML = `${escapeHtml(clean)}<span>.</span>`;
      };

      const formatClock = (iso) => {
        if (!iso) return '—';
        return new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' }).format(new Date(iso));
      };

      const elapsed = (iso) => {
        const seconds = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
        const minutes = Math.floor(seconds / 60);
        return `${String(minutes).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
      };

      const startTimer = (iso, selector = '#student-timer') => {
        clearInterval(timerHandle);
        const tick = () => {
          const target = document.querySelector(selector);
          if (target) target.textContent = elapsed(iso);
        };
        tick();
        timerHandle = setInterval(tick, 1000);
      };

      const renderPin = (message) => {
        clearInterval(timerHandle);
        content.className = '';
        content.innerHTML = `
          <form class="pin-box" id="pin-form">
            <h2>enter your PIN.</h2>
            <p class="message">${escapeHtml(message || 'Use the six-digit PIN Mr. Grant gave you.')}</p>
            <input class="pin-input" id="pin" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="off" aria-label="Six-digit student PIN">
            <button class="primary" type="submit">continue</button>
          </form>`;
        const input = document.querySelector('#pin');
        input.focus();
        document.querySelector('#pin-form').addEventListener('submit', async (event) => {
          event.preventDefault();
          clearError();
          const button = event.currentTarget.querySelector('button');
          button.disabled = true;
          try {
            state = await call('identifyWithPin', input.value);
            pinToken = state.pinToken;
            renderStudent();
          } catch (error) {
            showError(error.message);
            input.select();
          } finally {
            button.disabled = false;
          }
        });
      };

      const renderStudent = () => {
        clearError();
        clearInterval(timerHandle);
        setTitle(state.appTitle);
        const ownPass = state.ownPass;
        const firstName = String(state.student.name || '').split(/\s+/)[0] || state.student.name;
        content.className = '';
        content.innerHTML = `
          <div class="student-head">
            <div>
              <p class="eyebrow">${ownPass ? 'pass active' : 'ready when you are'}</p>
              <h2>${escapeHtml(firstName)}.</h2>
              <p class="student-meta">${escapeHtml(state.student.classPeriod || 'class')} · ${escapeHtml(state.method === 'pin' ? 'PIN check-in' : 'school Google account')}</p>
            </div>
            <span class="status-dot ${state.passAvailable ? '' : 'busy'}">${ownPass ? 'you are out' : state.passAvailable ? 'pass available' : 'pass in use'}</span>
          </div>
          <div class="pass-action">
            ${ownPass ? `
              <div class="timer">
                <p class="timer-label">time out of class</p>
                <p class="timer-time" id="student-timer">00:00</p>
              </div>
              <button class="primary return" id="pass-action">I’m back</button>` : `
              <p class="message">${state.passAvailable ? `Press the button when you are actually leaving for the ${escapeHtml(state.destination.toLowerCase())}.` : 'Someone else is using the pass. This page checks again automatically.'}</p>
              <button class="primary" id="pass-action" ${state.passAvailable ? '' : 'disabled'}>start pass</button>`}
            ${(APP_MODE === 'kiosk' || state.method === 'pin') ? '<button class="secondary" id="switch-student">different student</button>' : '<button class="secondary" id="use-pin">use a PIN instead</button>'}
          </div>`;

        if (ownPass) startTimer(ownPass.outTime);
        document.querySelector('#pass-action').addEventListener('click', async (event) => {
          const button = event.currentTarget;
          button.disabled = true;
          clearError();
          try {
            state = ownPass ? await call('returnPass', pinToken) : await call('startPass', pinToken);
            renderStudent();
            if (APP_MODE === 'kiosk' && !state.ownPass) setTimeout(() => resetKiosk(), 3500);
          } catch (error) {
            showError(error.message);
            button.disabled = false;
          }
        });

        const switchButton = document.querySelector('#switch-student');
        if (switchButton) switchButton.addEventListener('click', resetKiosk);
        const pinButton = document.querySelector('#use-pin');
        if (pinButton) pinButton.addEventListener('click', () => renderPin('Use your PIN if this Chromebook is not signed into your own account.'));
      };

      const resetKiosk = () => {
        pinToken = '';
        state = null;
        clearError();
        renderPin('Enter your six-digit PIN to sign out or return.');
      };

      const renderTeacher = () => {
        clearError();
        setTitle(state.appTitle);
        content.className = '';
        const activeHtml = state.active.length ? state.active.map((pass) => `
          <article class="active-pass">
            <strong>${escapeHtml(pass.studentName)}</strong>
            <small>${escapeHtml(pass.classPeriod)} · out at ${formatClock(pass.outTime)} · <span data-live-time="${escapeHtml(pass.outTime)}">${elapsed(pass.outTime)}</span></small>
            <button class="secondary" data-end-pass="${escapeHtml(pass.passId)}">mark returned</button>
          </article>`).join('') : '<p class="all-clear">Nobody is out right now.</p>';
        const rosterOptions = state.roster
          .slice()
          .sort((a, b) => a.classPeriod.localeCompare(b.classPeriod) || a.name.localeCompare(b.name))
          .map((student) => `<option value="${escapeHtml(student.email)}">${escapeHtml(student.name)} · ${escapeHtml(student.classPeriod)}</option>`).join('');
        const logRows = state.today.length ? state.today.map((pass) => `
          <tr>
            <td>${escapeHtml(pass.studentName)}</td>
            <td>${escapeHtml(pass.classPeriod)}</td>
            <td>${formatClock(pass.outTime)}</td>
            <td>${pass.status === 'OUT' ? 'out now' : formatClock(pass.returnTime)}</td>
            <td>${pass.minutesOut == null ? '—' : `${escapeHtml(pass.minutesOut)} min`}</td>
            <td class="method">${escapeHtml(pass.method)}</td>
          </tr>`).join('') : '<tr><td colspan="6">No passes logged today.</td></tr>';

        content.innerHTML = `
          <div class="student-head">
            <div><p class="eyebrow">private teacher controls</p><h2>today’s passes.</h2><p class="student-meta">${state.retentionDays}-day private history · maximum ${state.maxActivePasses} active</p></div>
            <button class="secondary" id="refresh-teacher">refresh</button>
          </div>
          <div class="teacher-grid">
            <section class="subcard"><h3>out right now</h3>${activeHtml}</section>
            <section class="subcard"><h3>teacher backup</h3><div class="override"><select id="teacher-student"><option value="">choose a student…</option>${rosterOptions}</select><button class="primary" id="teacher-start">start pass for student</button></div></section>
          </div>
          <section class="subcard log"><h3>today’s private log</h3><table><thead><tr><th>student</th><th>class</th><th>out</th><th>returned</th><th>time</th><th>method</th></tr></thead><tbody>${logRows}</tbody></table></section>`;

        clearInterval(timerHandle);
        timerHandle = setInterval(() => document.querySelectorAll('[data-live-time]').forEach((node) => { node.textContent = elapsed(node.dataset.liveTime); }), 1000);
        document.querySelector('#refresh-teacher').addEventListener('click', refreshTeacher);
        document.querySelector('#teacher-start').addEventListener('click', async (event) => {
          const email = document.querySelector('#teacher-student').value;
          if (!email) { showError('Choose a student first.'); return; }
          event.currentTarget.disabled = true;
          try { state = await call('teacherStartPass', email); renderTeacher(); }
          catch (error) { showError(error.message); event.currentTarget.disabled = false; }
        });
        document.querySelectorAll('[data-end-pass]').forEach((button) => button.addEventListener('click', async () => {
          button.disabled = true;
          try { state = await call('teacherEndPass', button.dataset.endPass, 'Ended from teacher dashboard'); renderTeacher(); }
          catch (error) { showError(error.message); button.disabled = false; }
        }));
      };

      const refreshTeacher = async () => {
        try { state = await call('refreshTeacherState'); renderTeacher(); }
        catch (error) { showError(error.message); }
      };

      const refreshStudent = async () => {
        if (!state || !state.recognized || APP_MODE === 'kiosk' && !pinToken) return;
        try { state = await call('refreshStudentState', pinToken); renderStudent(); }
        catch (error) { showError(error.message); }
      };

      (async () => {
        try {
          state = await call('getBootstrap', APP_MODE);
          setTitle(state.appTitle);
          if (APP_MODE === 'teacher') renderTeacher();
          else if (APP_MODE === 'kiosk') resetKiosk();
          else if (!state.recognized) renderPin(state.message);
          else renderStudent();
          refreshHandle = setInterval(APP_MODE === 'teacher' ? refreshTeacher : refreshStudent, APP_MODE === 'teacher' ? 15000 : 10000);
        } catch (error) {
          content.className = '';
          content.innerHTML = `<p class="message">${escapeHtml(error.message)}</p>`;
          showError('The hall pass could not verify this account.');
        }
      })();
    </script>
  </body>
</html>
